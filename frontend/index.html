<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>News Category Classifier</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      max-width: 720px;
      width: 100%;
      padding: 40px;
    }

    .header { text-align: center; margin-bottom: 32px; }
    .header h1 { font-size: 1.9rem; color: #1a202c; font-weight: 700; }
    .header p  { color: #64748b; margin-top: 8px; font-size: 0.95rem; }

    .badge {
      display: inline-block;
      background: #e0f2fe;
      color: #0284c7;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 12px;
    }

    label { display: block; font-weight: 600; color: #374151; margin-bottom: 8px; font-size: 0.9rem; }

    textarea {
      width: 100%;
      height: 130px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px;
      font-size: 0.95rem;
      resize: vertical;
      transition: border-color 0.2s;
      color: #1a202c;
      line-height: 1.6;
    }
    textarea:focus { outline: none; border-color: #3b82f6; }

    .actions { display: flex; gap: 12px; margin-top: 16px; }

    button {
      padding: 12px 28px;
      border-radius: 10px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
      flex: 1;
    }
    .btn-primary:hover  { background: #2563eb; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
    }
    .btn-secondary:hover { background: #e2e8f0; }

    /* Result card */
    .result {
      margin-top: 28px;
      padding: 24px;
      border-radius: 12px;
      border: 2px solid #e2e8f0;
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .result.visible { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .result-label { font-size: 0.8rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .result-category { font-size: 1.8rem; font-weight: 800; color: #1e40af; margin: 6px 0 4px; }
    .result-confidence { font-size: 0.9rem; color: #64748b; margin-bottom: 20px; }

    /* Confidence bar */
    .conf-bar-wrap { background: #e2e8f0; border-radius: 99px; height: 8px; margin-bottom: 20px; }
    .conf-bar { height: 8px; border-radius: 99px; background: #3b82f6; transition: width 0.6s ease; }

    /* Top 3 */
    .top3-title { font-size: 0.82rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .top3-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .top3-name  { font-size: 0.9rem; color: #374151; font-weight: 500; flex: 1; }
    .top3-bar-wrap { flex: 2; background: #f1f5f9; border-radius: 99px; height: 6px; margin: 0 12px; }
    .top3-bar { height: 6px; border-radius: 99px; background: #93c5fd; }
    .top3-pct { font-size: 0.85rem; font-weight: 700; color: #3b82f6; width: 44px; text-align: right; }

    /* Batch */
    .section-divider { border: none; border-top: 1px solid #e2e8f0; margin: 32px 0; }

    .batch-area {
      border: 2px dashed #cbd5e1;
      border-radius: 10px;
      padding: 20px;
      background: #f8fafc;
    }
    .batch-area h3 { font-size: 0.95rem; color: #475569; margin-bottom: 12px; }

    textarea#batchInput {
      height: 90px;
      background: white;
      margin-bottom: 12px;
    }

    .batch-results { margin-top: 16px; }
    .batch-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      background: #f8fafc;
      margin-bottom: 8px;
      border: 1px solid #e2e8f0;
    }
    .batch-idx { font-size: 0.75rem; font-weight: 700; color: #94a3b8; padding-top: 2px; min-width: 24px; }
    .batch-text { font-size: 0.85rem; color: #64748b; flex: 1; }
    .batch-tag {
      background: #dbeafe;
      color: #1d4ed8;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 700;
      white-space: nowrap;
    }


    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 14px;
      border-radius: 10px;
      font-size: 0.9rem;
      margin-top: 20px;
      display: none;
    }
    .error-box.visible { display: block; }

    
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    
    <h1>News Category Classifier</h1>
    <p>Paste a news headline or article snippet to automatically classify its category.</p>
  </div>

  <!-- Single prediction -->
  <label for="newsInput">News Text</label>
  <textarea id="newsInput" placeholder="e.g. Scientists discover new treatment for Alzheimer's disease..."></textarea>

  <div class="actions">
    <button class="btn-primary" id="classifyBtn" onclick="classify()">Classify</button>
    <button class="btn-secondary" onclick="clearAll()">Clear</button>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="result" id="resultCard">
    <div class="result-label">Predicted Category</div>
    <div class="result-category" id="resultCategory">—</div>
    <div class="result-confidence" id="resultConfidence"></div>
    <div class="conf-bar-wrap"><div class="conf-bar" id="confBar" style="width:0%"></div></div>

    <div class="top3-title">Top 3 Predictions</div>
    <div id="top3Container"></div>
  </div>

  <hr class="section-divider"/>

 
  <div class="batch-area">
    <h3>Batch Classification</h3>
    <textarea id="batchInput" placeholder="Enter one news text per line...&#10;Economy hits record high as markets soar&#10;New drug approved for cancer treatment"></textarea>
    <button class="btn-primary" onclick="batchClassify()" style="width:100%">Classify All</button>
    <div class="batch-results" id="batchResults"></div>
  </div>

</div>

<script>
  const API = 'http://localhost:5000';

  async function classify() {
    const text = document.getElementById('newsInput').value.trim();
    if (!text) { showError('Please enter some news text.'); return; }
    if (text.length < 5) { showError('Text is too short. Please enter at least a headline.'); return; }

    hideError();
    setLoading(true);

    try {
      const res = await fetch(`${API}/predict`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || 'Prediction failed.'); return; }
      displayResult(data);
    } catch (e) {
      showError('Cannot connect to the backend. Make sure the Flask server is running on port 5000.');
    } finally {
      setLoading(false);
    }
  }

  function displayResult(data) {
    document.getElementById('resultCategory').textContent = data.prediction;
    document.getElementById('resultConfidence').textContent = `Confidence: ${data.confidence}%`;
    document.getElementById('confBar').style.width = `${data.confidence}%`;

    const top3 = document.getElementById('top3Container');
    top3.innerHTML = (data.top3 || []).map(item => `
      <div class="top3-item">
        <span class="top3-name">${item.category}</span>
        <div class="top3-bar-wrap">
          <div class="top3-bar" style="width:${item.confidence}%"></div>
        </div>
        <span class="top3-pct">${item.confidence}%</span>
      </div>
    `).join('');

    const card = document.getElementById('resultCard');
    card.classList.remove('visible');
    void card.offsetWidth; // Force reflow for animation
    card.classList.add('visible');
  }

  async function batchClassify() {
    const raw = document.getElementById('batchInput').value.trim();
    if (!raw) return;

    const texts = raw.split('\n').map(t => t.trim()).filter(t => t.length > 0);
    if (texts.length === 0) return;

    const container = document.getElementById('batchResults');
    container.innerHTML = '<p style="color:#94a3b8;font-size:0.85rem;">Processing...</p>';

    try {
      const res = await fetch(`${API}/batch_predict`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ texts })
      });
      const data = await res.json();
      if (!res.ok) { container.innerHTML = `<p style="color:#dc2626">${data.error}</p>`; return; }

      container.innerHTML = data.results.map((r, i) => `
        <div class="batch-row">
          <span class="batch-idx">#${i+1}</span>
          <span class="batch-text">${texts[i].substring(0, 80)}${texts[i].length > 80 ? '…' : ''}</span>
          <span class="batch-tag">${r.error ? '⚠ Error' : r.prediction}</span>
        </div>
      `).join('');
    } catch (e) {
      container.innerHTML = '<p style="color:#dc2626">Cannot reach backend server.</p>';
    }
  }

  function clearAll() {
    document.getElementById('newsInput').value = '';
    document.getElementById('resultCard').classList.remove('visible');
    hideError();
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = '⚠ ' + msg;
    box.classList.add('visible');
  }

  function hideError() {
    document.getElementById('errorBox').classList.remove('visible');
  }

  function setLoading(loading) {
    const btn = document.getElementById('classifyBtn');
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<span class="spinner"></span>Classifying...'
      : 'Classify';
  }


  document.getElementById('newsInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) classify();
  });
</script>
</body>
</html>
